name: CI Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.10"

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        if [ -f app/requirements.txt ]; then pip install -r app/requirements.txt; fi

    - name: Lint (flake8)
      run: |
        pip install flake8
        flake8 app/src --max-line-length=120 || true

    - name: Run tests
      run: |
        echo "No tests yet — skipping"

    - name: Build Docker image
      run: |
        docker build -t otel-instrumentation-pipeline ./app || true
